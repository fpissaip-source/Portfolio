<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!--
      iOS-kritisch:
      - viewport-fit=cover: Inhalt läuft unter Notch/Home-Indicator, kombiniert mit
        env(safe-area-inset-*) in global.css
      - KEIN user-scalable=no / maximum-scale=1: das ist ein Accessibility-Fail auf iOS
        (Zoom-Geste wird komplett deaktiviert). Wir lösen "kein versehentliches Zoomen
        beim Doppel-Tap" stattdessen über touch-action in CSS.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0B0D" />
    <!-- Safari Standalone / Add-to-Homescreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="Issa — Developer. Bots, Automation, Web." />
    <title>Issa — Portfolio</title>
    <!-- Preconnect für Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
