name: Commit character model files

on:
  push:
    branches:
      - main
    paths:
      - .commit-character-assets
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Generate verified model files
        run: node scripts/sync-models.mjs

      - name: Copy Draco decoder files
        run: |
          mkdir -p public/draco
          cp node_modules/three/examples/jsm/libs/draco/draco_decoder.js public/draco/draco_decoder.js
          cp node_modules/three/examples/jsm/libs/draco/draco_decoder.wasm public/draco/draco_decoder.wasm
          cp node_modules/three/examples/jsm/libs/draco/draco_wasm_wrapper.js public/draco/draco_wasm_wrapper.js
          test -s public/draco/draco_decoder.js
          test -s public/draco/draco_decoder.wasm
          test -s public/draco/draco_wasm_wrapper.js
          sha256sum public/draco/draco_decoder.js public/draco/draco_decoder.wasm public/draco/draco_wasm_wrapper.js

      - name: Commit model and decoder files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add complete model and Draco decoder files
          file_pattern: public/models public/draco
