name: Commit character model files

on:
  push:
    branches:
      - main
    paths:
      - .commit-character-assets
  workflow_dispatch:

permissions:
  contents: write

jobs:
  assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate verified model files
        run: node scripts/sync-models.mjs

      - name: Commit model files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Add complete character model files
          file_pattern: public/models
